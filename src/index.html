<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My JS Toolbox</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@300..700&family=Roboto+Serif:ital,opsz,wght@0,8..144,100..900;1,8..144,100..900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./base.css" />
    <link rel="stylesheet" href="./dashboard.css" />
  </head>
  <body>
    <div class="container main-dashboard">
      <header class="dashboard-header">
        <h1 class="dashboard-title">JavaScript mini-projects</h1>
      </header>
      <main>
        <nav>
          <ul class="projects-grid">
            <li class="project-card">
              <a href="./projects/converter/converter.html" class="project-link"
                ><span class="project-num">01</span>
                <div class="project-info">
                  <h2 class="project-name">Distance Converter</h2>
                  <p class="project-desc">
                    Fast and reliable utility for converting metric and imperial
                    distance units.
                  </p>
                </div>
                <div class="project-arrow">→</div></a
              >
            </li>
            <li class="project-card">
              <a href="./projects/filter/filter.html" class="project-link"
                ><span class="project-num">02</span>
                <div class="project-info">
                  <h2 class="project-name">FilterFlow</h2>
                  <p class="project-desc">
                    Data query studio for dynamic filtering, sorting, and JSON
                    parsing.
                  </p>
                </div>
                <div class="project-arrow">→</div></a
              >
            </li>
            <li class="project-card">
              <a href="./projects/ttt-game/ttt.html" class="project-link"
                ><span class="project-num">03</span>
                <div class="project-info">
                  <h2 class="project-name">Tic-Tac-Toe Game</h2>
                  <p class="project-desc"></p>
                </div>
                <div class="project-arrow">→</div></a
              >
            </li>
          </ul>
        </nav>
      </main>
    </div>
    <script type="module" src="./main.js"></script>
  </body>
</html>
