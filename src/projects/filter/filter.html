<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FilterFlow</title>
    <link rel="stylesheet" href="../../base.css" />
    <link rel="stylesheet" href="./style-filter.css" />
  </head>
  <body>
    <div class="container">
      <header>
        <h1 class="project-name">FilterFlow</h1>
      </header>
      <main>
        <section class="preset-btn">
          <span>Load Test Presets:</span>
          <button type="button" data-preset="include">Filter & Sort</button>
          <button type="button" data-preset="exclude-or">Exclude OR</button>
          <button type="button" data-preset="exclude-and">Exclude AND</button>
        </section>
        <form class="filter-form">
          <label>
            Input JSON (Data & Conditions)
            <textarea
              id="json-input"
              class="panel-textarea"
              name="jsonInput"
              placeholder='Paste your JSON here... &#10;Example:&#10;{&#10;  "data": [...],&#10;  "condition": {...}&#10;}'
            ></textarea>
          </label>
          <label>
            Resulting JSON (Output)
            <textarea
              id="json-output"
              class="panel-textarea"
              readonly
              placeholder="Processed results will appear here..."
            ></textarea>
          </label>
          <button type="submit" class="process-btn">Process Data</button>
          <label class="panel-label">
            Filtering and Sorting Conditions
            <textarea
              id="conditions"
              name="jsonCondition"
              placeholder='Paste your rules here...&#10;Example:&#10;{&#10;  "include": [{"name": "John"}],&#10;  "sortBy": ["email"]&#10;}'
            ></textarea>
          </label>
        </form>
      </main>
    </div>
    <script type="module" src="./app-filter.js"></script>
  </body>
</html>
